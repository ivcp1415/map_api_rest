<!DOCTYPE html>
<html lang="ca">


<head>
  <title>APP Punt interès</title>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="styles/styles.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
</head>


<body>


  <div class="container">
    <section class="container-llista">
      <header class="title">
        <span class="info-pais"></span>
        <span class="info-lloc"></span>
      </header>
      <article class="filter-form">
        <form id="filterForm">
          <div class="form-row">
            <div class="form-group">
              <label for="typeFilter">Tipus:</label>
              <select id="typeFilter" name="typeFilter">
              </select>
            </div>
            <div class="form-group">
              <label for="sortOrder">Ordenació:</label>
              <select id="sortOrder" name="sortOrder">
                <option value="asc" selected>Ascendent</option>
                <option value="desc">Descendent</option>
              </select>
            </div>


          </div>
          <div class="form-row">
            <div class="form-group-input">
              <input type="text" id="nameFilter" name="nameFilter" placeholder="Filtrar per nom...">
            </div>
          </div>
        </form>
      </article>
      <article class="container-punt-interes">
        <h5>No hi ha informació per mostrar</h5>
      </article>
      <article class="container-num-total">
        <p class="numTotal"> Número total: </p>
        <button class="clear-list"> Netejar tot </button>
      </article>
      <article class="container-load-file">
        <div class="dropZone">
          Arrossegar un fitxer CSV aquí per carregar la informació
        </div>
      </article>
    </section>
    <section id="map" class="container-map"></section>
  </div>
  
  <script type="module" src="js/app.js"></script>
</body>


</html>
